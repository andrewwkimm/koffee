name: Set up ffmpeg
description: >-
  Installs ffmpeg with backoff retries: apt on Linux, ffmpeg-full via Homebrew
  on macOS (the default ffmpeg formula dropped libass in 2026, breaking the
  subtitles filter), and Chocolatey on Windows. Avoids third-party actions that
  download from johnvansickle.com, which rate-limits GitHub IPs and caused frequent
  failures.

runs:
  using: composite
  steps:
    - name: Install ffmpeg (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        for attempt in 1 2 3; do
          if sudo apt-get update && sudo apt-get install -y ffmpeg; then
            break
          fi
          echo "ffmpeg install attempt ${attempt} failed; retrying in $((attempt * 15))s" >&2
          sleep $((attempt * 15))
        done
        ffmpeg -version

    - name: Install ffmpeg (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        for attempt in 1 2 3; do
          if brew install ffmpeg-full; then
            break
          fi
          echo "ffmpeg install attempt ${attempt} failed; retrying in $((attempt * 15))s" >&2
          sleep $((attempt * 15))
        done
        ffmpeg -version

    - name: Install ffmpeg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        for ($attempt = 1; $attempt -le 3; $attempt++) {
          choco install ffmpeg -y --no-progress
          if ($LASTEXITCODE -eq 0) { break }
          Write-Host "ffmpeg install attempt $attempt failed; retrying in $($attempt * 15)s"
          Start-Sleep -Seconds ($attempt * 15)
        }
        ffmpeg -version
